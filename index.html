<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picanha na Tábua</title>
  <link rel="icon" type="image/jpeg" href="imagens/logo-picanha.jpg">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #111;
      color: #fff;
    }

    /* Navbar */
    .navbar {
      display: flex;
      flex-direction: column; /* mobile first */
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #FF4C4C, #FFD700);
      padding: 12px;
    }
    .navbar a {
      color: #111;
      font-weight: bold;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .navbar a:hover {
      color: #fff;
      text-shadow: 0 0 10px rgba(255,140,0,0.9);
    }

    /* Header com logo */
    header {
      text-align: center;
      padding: 20px;
      font-weight: bold;
      font-size: 22px;
      background: #222;
      color: #FFD700;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-header {
      height: 40px; /* mobile first */
      margin-right: 10px;
      vertical-align: middle;
    }

    /* Galeria mobile first */
    .galeria {
      display: flex;
      flex-direction: column; /* mobile: coluna única */
      gap: 15px;
      padding: 15px;
    }
    .galeria img {
      width: 100%;
      height: 220px;
      object-fit: cover; /* imagem justa e completa */
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255,76,76,0.6);
      transition: transform 0.3s ease;
    }
    .galeria img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255,140,0,0.9);
    }

    /* Botão flutuante logo */
    .float-logo {
      position: fixed;
      bottom: 20px;
      right: 20px;
    }
    .float-logo img {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(255,215,0,0.8);
      transition: transform 0.3s ease;
    }
    .float-logo img:hover {
      transform: scale(1.1);
    }

    /* Botão WhatsApp */
    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
    }
    .whatsapp-btn a {
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: #fff;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 0 15px rgba(37, 211, 102, 0.7);
      transition: all 0.3s ease;
    }
    .whatsapp-btn a:hover {
      background: linear-gradient(135deg, #128C7E, #25D366);
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(255, 76, 76, 0.9);
    }

    /* Desktop */
    @media (min-width: 768px) {
      .navbar {
        flex-direction: row;
        justify-content: center;
      }
      .galeria {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }
      .galeria img {
        width: 300px;
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html">Início</a>
    <a href="menu.html">Menu</a>
    <a href="pedidos.html">Pedidos</a>
    <a href="eventos.html">Eventos</a>
    <a href="contactos.html">Contactos</a>
  </nav>

  <!-- Header com logo -->
  <header>
  <a href="index.html">
    <img src="imagens/logo-picanha.jpg" alt="Picanha na Tábua" class="logo-header">
  </a>
  <span>Pedidos - Picanha na Tábua 🔥</span>
</header>

  <!-- Galeria -->
  <section class="galeria">
  <img src="imagens/picanha1.jpg" alt="Ambiente 1">
  <img src="imagens/picanha2.jpg" alt="Ambiente 2">
  <img src="imagens/picanha3.jpg" alt="Ambiente 3">
  <img src="imagens/picanha4.jpg" alt="Ambiente 4">
  <img src="imagens/picanha5.jpg" alt="Ambiente 5">
  <img src="imagens/picanha6.jpg" alt="Ambiente 6">
</section>


  <!-- Botão flutuante logo -->
  <div class="float-logo">
    <a href="menu.html">
      <img src="imagens/logo-picanha.jpg" alt="Picanha na Tábua">
    </a>
  </div>

  <!-- Botão WhatsApp -->
  <div class="whatsapp-btn">
    <a href="https://wa.me/244939040608" target="_blank">💬 Fale comigo aqui</a>
  </div>

</body>
</html>
